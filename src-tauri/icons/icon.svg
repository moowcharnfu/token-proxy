<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="5" y="5" width="90" height="90" rx="16" fill="url(#bg)"/>

  <!-- Brand text -->
  <text x="50" y="18" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" letter-spacing="0.5">moowcharnfu</text>

  <!-- Token/Key shape -->
  <g transform="translate(50, 50)" filter="url(#glow)">
    <!-- Key hole -->
    <circle cx="0" cy="-8" r="10" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <!-- Key body -->
    <rect x="-4" y="2" width="8" height="20" rx="2" fill="url(#accent)"/>
    <!-- Key teeth -->
    <rect x="4" y="12" width="10" height="4" rx="1" fill="url(#accent)"/>
    <rect x="4" y="19" width="6" height="4" rx="1" fill="url(#accent)"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="20" cy="20" r="2" fill="#06b6d4" opacity="0.5"/>
  <circle cx="80" cy="20" r="2" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="20" cy="80" r="2" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="80" cy="80" r="2" fill="#06b6d4" opacity="0.5"/>
</svg>
