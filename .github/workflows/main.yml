name: Release CI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: linux
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundle: macos-x86_64
            deployment_target: '10.15'
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle: macos-aarch64
            deployment_target: '11.0'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: windows-x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set macOS deployment target
        if: startsWith(matrix.platform, 'macos')
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=${{ matrix.deployment_target }}" >> $GITHUB_ENV
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
        run: npm run tauri build

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.bundle }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build-tauri
    runs-on: ubuntu-latest
    # 可选：如果坚持使用 GITHUB_TOKEN，需在此处声明 permissions: contents: write
    # 但使用 PAT 时，权限由 PAT 本身的 scope 决定，此处可不写或保留默认
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true
          path: ./release-assets

      - name: List Assets
        run: ls -l ./release-assets

      - name: Generate Checksums
        run: |
          cd ./release-assets
          # 初始化 checksums 文件
          > checksums.txt
          # 遍历常见安装包格式生成 sha256
          for file in *.exe *.dmg *.deb *.AppImage *.zip *.tar.gz; do
            if [ -f "$file" ]; then
              sha256sum "$file" >> checksums.txt
            fi
          done
          
          # 显示校验和内容以便调试
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-assets/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Automated release for ${{ github.ref_name }}.
          draft: false
          prerelease: false
          # 关键修改：使用 PAT 令牌
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
